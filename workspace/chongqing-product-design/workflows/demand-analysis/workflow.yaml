# Demand Analysis Configuration
name: "demand-analysis"
description: "需要进行三阶段需求分析以生成详细的需求分析报告"
author: "Clara"

# Critical variables from config
execution_mode: "#debug"
config_source: "{project-root}/chongqing-product-design/config.yaml"
output_folder: "{config_source}:output_folder"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated

# Module path and component files
installed_path: "{project-root}/chongqing-product-design/workflows/demand-analysis"
template: "{installed_path}/template.md"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"

# Output configuration
default_output_file: "{output_folder}/需求分析报告-{{demand_name}}-{{date}}.md"

standalone: true
